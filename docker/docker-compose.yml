services:
  db:
    image: postgres:17
    container_name: hp_backend_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newssite}
      POSTGRES_USER: ${POSTGRES_USER:-newuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hp_backend_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newssite}
      POSTGRES_USER: ${POSTGRES_USER:-newuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newpassword}
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - ..:/app

volumes:
  postgres_data:
